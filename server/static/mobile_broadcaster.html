<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Mobile Broadcaster</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: radial-gradient(circle at top, #0f172a 0%, #020617 80%);
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: Arial, sans-serif;
      }

      .mobile-shell {
        position: relative;
        width: 100%;
        height: 100%;
      }

      video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        background: #000;
        pointer-events: none;
      }

      video::-webkit-media-controls {
        display: none !important;
      }

      .mobile-badge {
        position: absolute;
        top: 18px;
        left: 18px;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 14px;
        border-radius: 999px;
        background: rgba(15, 23, 42, 0.72);
        color: #e2e8f0;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        border: 1px solid rgba(148, 163, 184, 0.22);
        z-index: 2;
      }

      .mobile-badge::before {
        content: "";
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: #22c55e;
        box-shadow: 0 0 0 6px rgba(34, 197, 94, 0.18);
      }
    </style>
  </head>
  <body>
    <main class="mobile-shell">
      <div id="mobileBadge" class="mobile-badge">Iniciando camera...</div>
      <video id="localVideo" autoplay playsinline muted disablepictureinpicture></video>
    </main>
    <script src="/static/mobile_broadcaster.js"></script>
  </body>
</html>
