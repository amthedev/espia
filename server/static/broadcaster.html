<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Transmissor</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="container">
      <section class="card">
        <h1>Transmissor (camera + microfone)</h1>
        <p id="roomLabel"></p>
        <div class="actions">
          <button id="startBtn">Iniciar transmissao</button>
          <button id="stopBtn" class="stop" disabled>Parar</button>
        </div>
        <p id="status" class="status">Aguardando inicio...</p>
        <video id="localVideo" autoplay playsinline muted></video>
      </section>
    </main>

    <script src="/static/broadcaster.js"></script>
  </body>
</html>
